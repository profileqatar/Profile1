<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile UI Design</title>
    <!-- FontAwesome for precise icon replication -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #120e16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        /* Responsive Mobile Container & Desktop Card Preview */
        .profile-container {
            width: 100%;
            max-width: 412px; 
            height: 920px;
            max-height: 98vh;
            background: linear-gradient(165deg, #44323c 0%, #221a25 35%, #120e16 100%);
            border-radius: 44px;
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* Top Header Actions */
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-title {
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ffffff;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Avatar Section */
        .avatar-wrapper {
            position: relative;
            align-self: flex-start;
            margin-left: 8px;
            margin-bottom: 45px;
        }

        .avatar-circle {
            width: 180px;
            height: 180px;
            background-color: #f6c845;
            border-radius: 50%;
            position: relative;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Experience Badge Overlay */
        .experience-badge {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.95);
        }

        /* Green Floating Button */
        .fab-chat {
            position: absolute;
            bottom: 10px;
            right: -8px;
            width: 56px;
            height: 56px;
            background-color: #5cb85c;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.25rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(92, 184, 92, 0.3);
        }

        .fab-chat .question-mark {
            font-size: 0.62rem;
            position: absolute;
            font-weight: bold;
            top: 22px;
        }

        /* Identity Info */
        .user-info {
            margin-bottom: 20px;
            padding-left: 8px;
        }

        .user-name {
            font-size: 2.6rem;
            font-weight: 500;
            line-height: 1.15;
            letter-spacing: -0.5px;
        }

        /* Save Contact Button Layout */
        .save-contact-container {
            padding-left: 8px;
            margin-bottom: 25px;
        }

        .save-contact-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            height: 54px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .save-contact-btn:hover {
            background: #ffffff;
            color: #120e16;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        /* Social & Contact Shortcuts Grid */
        .social-contact-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            padding-left: 8px;
            margin-bottom: 30px;
        }

        .social-item {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 48px;
            border-radius: 16px;
            color: #ffffff;
            font-size: 1.2rem;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .social-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.12);
        }

        .social-item.whatsapp:hover { background-color: #25D366; border-color: #25D366; }
        .social-item.google-maps:hover { background-color: #EA4335; border-color: #EA4335; }
        .social-item.instagram:hover { background-color: #E1306C; border-color: #E1306C; }
        .social-item.facebook:hover { background-color: #1877F2; border-color: #1877F2; }
        .social-item.email:hover { background-color: #F4B400; border-color: #F4B400; }
        .social-item.website:hover { background-color: #0077B5; border-color: #0077B5; }

        /* Metric/Stat Pills */
        .stats-counter-container {
            display: flex;
            gap: 12px;
            margin-bottom: auto;
            padding-left: 8px;
        }

        .stat-pill {
            background: rgba(255, 255, 255, 0.06);
            padding: 12px 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .stat-pill i {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        /* Bottom Tab Navigation Bar */
        .navigation-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: rgba(0, 0, 0, 0.35);
            padding: 6px;
            border-radius: 40px;
            gap: 4px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 18px 0;
            border-radius: 35px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #000000;
        }

        /* Mobile View Overrides */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            .profile-container {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                padding: 50px 20px 24px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- Header Section -->
        <header class="profile-header">
            <button class="icon-btn" aria-label="Back"><i class="fa-solid fa-arrow-left"></i></button>
            <span class="header-title">Profile</span>
            <button class="icon-btn" aria-label="Menu"><i class="fa-solid fa-table-cells-large"></i></button>
        </header>

        <!-- Avatar & Experience Layout -->
        <div class="avatar-wrapper">
            <div class="avatar-circle">
                <!-- Using a high-quality online placeholder photo for the webpage profile view -->
                <img id="profile-display-img" src="https://encrypted-tbn2.gstatic.com/licensed-image?q=tbn:ANd9GcQ6Nc9GvwGwoYIQRqvC6DDWeYPeTW72_tJGll_M-N4paK20jkfjcFnSUbHtceDtSncMU3uK9cgQdpUwjRU" alt="Muhammad Asif">
                <div class="experience-badge">12 years experience</div>
            </div>
            <button class="fab-chat" aria-label="Chat help">
                <i class="fa-regular fa-comment-dots"></i>
                <span class="question-mark">?</span>
            </button>
        </div>

        <!-- User Information -->
        <main class="user-info">
            <h1 class="user-name">Muhammad<br>Asif</h1>
        </main>

        <!-- All-in-One Save Contact Trigger -->
        <section class="save-contact-container">
            <button id="vcard-btn" class="save-contact-btn">
                <i class="fa-solid fa-user-plus"></i> Save Contact
            </button>
        </section>

        <!-- Dynamic Action Grid: Socials & Contacts -->
        <section class="social-contact-grid">
            <a href="https://wa.me/97412345678" target="_blank" class="social-item whatsapp" title="WhatsApp">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
            <a href="https://maps.google.com" target="_blank" class="social-item google-maps" title="Office Location">
                <i class="fa-solid fa-location-dot"></i>
            </a>
            <a href="https://instagram.com" target="_blank" class="social-item instagram" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://facebook.com" target="_blank" class="social-item facebook" title="Facebook">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="mailto:info@yourdomain.com" class="social-item email" title="Email Me">
                <i class="fa-regular fa-envelope"></i>
            </a>
            <a href="https://yourdomain.com" target="_blank" class="social-item website" title="Website">
                <i class="fa-solid fa-globe"></i>
            </a>
        </section>

        <!-- Stats Section -->
        <section class="stats-counter-container">
            <div class="stat-pill">
                <i class="fa-solid fa-user-minus"></i>
                <span>275K</span>
            </div>
            <div class="stat-pill">
                <i class="fa-regular fa-copy"></i>
                <span>2,963</span>
            </div>
            <div class="stat-pill">
                <i class="fa-solid fa-user-plus"></i>
                <span>581</span>
            </div>
        </section>

        <!-- Dynamic Navigation Tabs -->
        <nav class="navigation-tabs">
            <button class="tab-btn active">Hello</button>
            <button class="tab-btn">Stats</button>
            <button class="tab-btn">Photos</button>
            <button class="tab-btn">About</button>
        </nav>
    </div>

    <!-- Script to dynamically download an online photo and pack it inside the vCard download -->
    <script>
        document.getElementById('vcard-btn').addEventListener('click', async () => {
            // URL of the free online sample picture we want saved into the phone's address book
            const imageUrl = 'https://encrypted-tbn2.gstatic.com/licensed-image?q=tbn:ANd9GcQ6Nc9GvwGwoYIQRqvC6DDWeYPeTW72_tJGll_M-N4paK20jkfjcFnSUbHtceDtSncMU3uK9cgQdpUwjRU';
            let base64PhotoText = '';

            try {
                // Fetch the image and convert it into standard Base64 string data completely in the background
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                
                base64PhotoText = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        // Strip out standard meta layout header tags to keep clean data string
                        const base64String = reader.result.split(',')[1];
                        resolve(base64String);
                    };
                    reader.readAsDataURL(blob);
                });
            } catch (error) {
                console.log('Using fallback text profile card generation.');
            }

            // Build the complete digital business card file array structure
            const vcardLines = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                "N:Asif;Muhammad;;;",
                "FN:Muhammad Asif -Mohamed and Partners",
                "ORG:Mohamed and Partners",
                "TITLE:Managing Partner",
                "TEL;TYPE=CELL;TYPE=PREF:+97412345678",
                "EMAIL;TYPE=PREF,INTERNET:info@yourdomain.com",
                "URL:https://profileqatar.github.io/Profile1/",
                "NOTE:Accounting and Auditing Services in Qatar"
            ];

            // If the image conversion completed successfully, append the photo code line straight to the layout
            if (base64PhotoText) {
                vcardLines.push("PHOTO;TYPE=JPEG;ENCODING=b:" + base64PhotoText);
            }

            vcardLines.push("END:VCARD");

            const vcardContent = vcardLines.join("\r\n");
            
            // Generate a direct system download trigger out of the combined data text stream
            const blobFile = new Blob([vcardContent], { type: 'text/vcard;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blobFile);
            link.download = 'Muhammad_Asif.vcf';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
